<!DOCTYPE html>
<html><head><style>
  :root { --bg:#0a0a0c; --bg3:#1a1a1f; --border:#2a2a30; --c:#ff6a9b; --muted:#999; --ease-spring: cubic-bezier(0.34,1.56,0.64,1); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); padding:40px; font-family:monospace; }
  .grid { display:grid; grid-template-columns:repeat(3, 180px); gap:2rem; }
  .tf-box { height:80px; background:var(--bg3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:1rem; color:var(--muted); transition: transform 0.4s var(--ease-spring), border-color 0.2s; }
  .tf-box:hover { border-color:var(--c); color:var(--c); }
  .tf-box:hover.flip-x { transform: scaleX(-1); }
  .tf-box:hover.flip-y { transform: scaleY(-1); }
  .tf-box:hover.persp  { transform: perspective(200px) rotateY(45deg); }
</style></head>
<body>
  <div class="grid">
    <div class="tf-box flip-x">flip-x Rq</div>
    <div class="tf-box flip-y">flip-y Rq</div>
    <div class="tf-box persp">persp Rq</div>
  </div>
</body></html>
