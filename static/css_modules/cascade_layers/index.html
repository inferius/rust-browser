<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>@layer</title><link rel="stylesheet" href="index.css"></head>
<body>
    <header><h1>CSS Cascade Layers @layer</h1>
        <p>Layered rules maji nizsi prio nez unlayered. Layer order: pozdejsi vyhrava.</p>
    </header>
    <main>
        <section><h2>Unlayered prepise layered</h2>
            <p class="a">tento p ma color modry (unlayered prepise red ze layeru base)</p>
        </section>
        <section><h2>Pozdejsi layer prepise drivejsi</h2>
            <p class="b">tento p ma color zeleny (second prepise first)</p>
        </section>
    </main>
</body>
</html>
