<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>text-shadow</title><link rel="stylesheet" href="index.css"></head>
<body>
    <header><h1>CSS text-shadow</h1></header>
    <main>
        <section><h2>baseline</h2><p class="t1">no shadow</p></section>
        <section><h2>2px 2px 4px black</h2><p class="t2">drop shadow</p></section>
        <section><h2>0 0 10px red (glow)</h2><p class="t3">red glow</p></section>
        <section><h2>3px 3px 0 blue (offset)</h2><p class="t4">offset blue</p></section>
    </main>
</body>
</html>
