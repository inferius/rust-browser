<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>CSS clip-path</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1>CSS clip-path</h1>
        <p>inset, circle, ellipse, polygon (parser zatim)</p>
    </header>
    <main>
        <section><h2>clip-path: inset(10px 20px 30px 40px round 8px)</h2>
            <div class="b1">inset clip</div>
        </section>
        <section><h2>clip-path: circle(50% at center)</h2>
            <div class="b2">circle clip</div>
        </section>
        <section><h2>clip-path: ellipse(40% 30% at center)</h2>
            <div class="b3">ellipse</div>
        </section>
        <section><h2>clip-path: polygon(0 0, 100% 0, 50% 100%)</h2>
            <div class="b4">trojuhelnik</div>
        </section>
    </main>
</body>
</html>
