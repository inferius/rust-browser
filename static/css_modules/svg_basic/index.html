<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SVG basic shapes</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1>SVG basic shapes</h1>
        <p>rect, circle, ellipse, line, text - native paint emit</p>
    </header>
    <main>
        <section><h2>SVG rect</h2>
            <svg width="300" height="100">
                <rect x="10" y="10" width="80" height="60" fill="red"/>
                <rect x="100" y="10" width="80" height="60" fill="green" rx="10"/>
                <rect x="200" y="10" width="80" height="60" fill="blue" stroke="black" stroke-width="2"/>
            </svg>
        </section>
        <section><h2>SVG circle/ellipse</h2>
            <svg width="300" height="100">
                <circle cx="50" cy="50" r="40" fill="orange"/>
                <ellipse cx="150" cy="50" rx="60" ry="30" fill="purple"/>
                <circle cx="250" cy="50" r="30" fill="cyan"/>
            </svg>
        </section>
        <section><h2>SVG line + text</h2>
            <svg width="300" height="80">
                <line x1="10" y1="40" x2="290" y2="40" stroke="black" stroke-width="2"/>
                <text x="20" y="65" fill="red" font-size="16">SVG text</text>
            </svg>
        </section>
    </main>
</body>
</html>
