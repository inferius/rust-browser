<!DOCTYPE html><html><head><style>
body{margin:0;font-family:sans-serif;padding:30px;}
#rz{width:250px;height:150px;border:3px solid #1a73e8;resize:both;overflow:auto;padding:10px;font-size:16px;background:#eef;}
#status{font-size:18px;color:#d00;margin-top:20px;}
</style></head><body>
<div id="rz">Tahni za pravy dolni roh pro zmenu velikosti.</div>
<div id="status">size: ?</div>
<script>
new ResizeObserver(es => {
  for (const e of es) {
    document.getElementById('status').textContent =
      'size: ' + Math.round(e.contentRect.width) + 'x' + Math.round(e.contentRect.height);
  }
}).observe(document.getElementById('rz'));
</script>
</body></html>
