<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>flex_basic</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; font-size: 16px; }
.row {
  display: flex;
  gap: 10px;
  width: 500px;
  height: 100px;
  padding: 8px;
  background: #eee;
}
.item { background: #ccc; height: 60px; }
#a { width: 100px; }
#b { flex: 1; }
#c { width: 80px; }
</style>
</head><body>
<div class="row">
  <div id="a" class="item">A</div>
  <div id="b" class="item">B</div>
  <div id="c" class="item">C</div>
</div>
</body></html>
