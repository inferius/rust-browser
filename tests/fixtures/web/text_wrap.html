<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>text_wrap</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; font-size: 16px; line-height: 1.4; }
.col { width: 200px; padding: 8px; background: #eef; margin: 10px; }
.short { width: 80px; padding: 4px; background: #ffe; margin: 10px; }
p { margin-bottom: 6px; }
</style>
</head><body>
<div class="col">
  <p id="p1">Lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor.</p>
</div>
<div class="short">
  <p id="p2">word word word word word word word word</p>
</div>
</body></html>
