<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>grid_minmax</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; font-size: 16px; }
.grid {
  display: grid;
  grid-template-columns: minmax(100px, 200px) 1fr 2fr;
  grid-template-rows: 80px;
  gap: 10px;
  width: 600px;
}
.cell { background: #ddd; }
</style>
</head><body>
<div class="grid">
  <div id="a" class="cell">A</div>
  <div id="b" class="cell">B</div>
  <div id="c" class="cell">C</div>
</div>
</body></html>
