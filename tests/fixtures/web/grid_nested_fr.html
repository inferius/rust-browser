<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>grid_nested_fr</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; }
.outer {
  display: grid;
  grid-template-columns: 310px 1fr;
  width: 100%;
}
.right {
  display: grid;
  grid-template-rows: 100px 1fr;
  background: #fee;
}
.top { background: #efe; padding: 8px; }
.bottom { background: #eef; padding: 8px; }
.left { background: #ddd; padding: 8px; height: 400px; }
</style>
</head><body>
<div class="outer">
  <div id="a" class="left">left 310px</div>
  <div id="b" class="right">
    <div id="c" class="top">top 100px</div>
    <div id="d" class="bottom">bottom 1fr</div>
  </div>
</div>
</body></html>
