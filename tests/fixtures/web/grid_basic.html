<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>grid_basic</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; font-size: 16px; }
.grid {
  display: grid;
  grid-template-columns: 100px 200px 1fr;
  grid-template-rows: 80px 60px;
  gap: 10px;
  width: 600px;
  padding: 0;
}
.cell { background: #ddd; }
#a { grid-column: 1 / 2; grid-row: 1 / 2; }
#b { grid-column: 2 / 3; grid-row: 1 / 2; }
#c { grid-column: 3 / 4; grid-row: 1 / 2; }
#d { grid-column: 1 / 4; grid-row: 2 / 3; }
</style>
</head><body>
<div class="grid">
  <div id="a" class="cell">A</div>
  <div id="b" class="cell">B</div>
  <div id="c" class="cell">C</div>
  <div id="d" class="cell">D</div>
</div>
</body></html>
