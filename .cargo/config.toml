# Main thread stack size = 16 MB (Windows default = 1 MB).
#
# Stacker crate auto-grows na hot recursion paths (dom::walk, layout, paint),
# takze 16 MB primarni stack staci. Pri maybe_grow stacker spawnne worker
# thread s 8 MB chunk pri detekci red-zone (last 32 KB).
#
# 16 MB primarni navic kvuli winit event handler + interpreter scope chain.

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/STACK:67108864"]

[target.i686-pc-windows-msvc]
rustflags = ["-C", "link-arg=/STACK:67108864"]

[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/STACK:67108864"]

[target.x86_64-pc-windows-gnu]
rustflags = ["-C", "link-arg=-Wl,--stack,67108864"]
