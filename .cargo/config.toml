# Stack size pro main thread.
# Default Windows = 1 MB. Layout engine + recursive parse + winit event handler
# v debug buildu (zadne opt) preteka. Nastavime na 16 MB.
#
# Linux/macOS default je 8 MB co staci, ale pro konzistenci nastavime tez.

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/STACK:16777216"]

[target.i686-pc-windows-msvc]
rustflags = ["-C", "link-arg=/STACK:16777216"]

[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/STACK:16777216"]

[target.x86_64-pc-windows-gnu]
rustflags = ["-C", "link-arg=-Wl,--stack,16777216"]

# macOS / Linux: default stack 8 MB, normalne staci. Kdyby ne, lze odkomentovat:
# [target.x86_64-apple-darwin]
# rustflags = ["-C", "link-arg=-Wl,-stack_size,0x1000000"]
# [target.aarch64-apple-darwin]
# rustflags = ["-C", "link-arg=-Wl,-stack_size,0x1000000"]
