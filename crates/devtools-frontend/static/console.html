<div style="display:flex;flex-direction:column;height:100%;">
    <div class="console-log" id="console-log"></div>
    <input type="text" class="console-input" id="console-input" placeholder="Eval JS expression and press Enter...">
</div>
<script>
    (function () {
        const log = document.getElementById('console-log');
        const input = document.getElementById('console-input');

        function appendEntry(level, text) {
            const div = document.createElement('div');
            div.className = 'entry ' + level;
            div.textContent = text;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        input.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            const expr = input.value;
            if (!expr) return;
            appendEntry('input', '> ' + expr);
            input.value = '';
            window.cdp.send('Runtime.evaluate', { expression: expr, return_by_value: true })
                .then(result => {
                    const ro = result.result || {};
                    if (result.exception_details) {
                        appendEntry('error', '< Exception: ' + result.exception_details.text);
                    } else {
                        appendEntry('result', '< ' + (ro.description || JSON.stringify(ro.value)));
                    }
                })
                .catch(e => { appendEntry('error', '< Error: ' + e.message); });
        });

        if (window.cdp) {
            window.cdp.on('Runtime.consoleAPICalled', evt => {
                const level = evt.type || 'log';
                const args = (evt.args || []).map(a => a.description || JSON.stringify(a.value)).join(' ');
                appendEntry(level, args);
            });
        }
    })();
</script>
