<div style="display:flex;flex-direction:column;height:100%;">
    <div style="padding:4px;border-bottom:1px solid #3c4043;">
        <input type="text" id="filter" placeholder="Filter (e.g. .js, .css, GET, 200)" style="width:300px;">
        <button id="btn-clear">Clear</button>
    </div>
    <div style="flex:1;overflow:auto;">
        <table class="network-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Method</th>
                    <th>Status</th>
                    <th>Type</th>
                    <th>Size</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="network-rows"></tbody>
        </table>
    </div>
</div>
<script>
    (function () {
        const rows = document.getElementById('network-rows');
        const filter = document.getElementById('filter');
        const entries = []; // { request_id, url, method, status, type, size, time_ms }

        document.getElementById('btn-clear').addEventListener('click', () => {
            entries.length = 0;
            renderRows();
        });

        filter.addEventListener('input', renderRows);

        function renderRows() {
            rows.innerHTML = '';
            const q = filter.value.toLowerCase();
            for (const e of entries) {
                if (q && !(
                    e.url.toLowerCase().includes(q) ||
                    e.method.toLowerCase().includes(q) ||
                    String(e.status).includes(q) ||
                    e.type.toLowerCase().includes(q)
                )) continue;
                const tr = document.createElement('tr');
                tr.innerHTML = '<td>' + escapeHtml(e.url) + '</td>' +
                    '<td>' + e.method + '</td>' +
                    '<td>' + e.status + '</td>' +
                    '<td>' + e.type + '</td>' +
                    '<td>' + (e.size != null ? e.size : '-') + '</td>' +
                    '<td>' + (e.time_ms != null ? e.time_ms + 'ms' : '-') + '</td>';
                rows.appendChild(tr);
            }
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
        }

        function findById(id) {
            return entries.find(e => e.request_id === id);
        }

        if (window.cdp) {
            window.cdp.on('Network.requestWillBeSent', evt => {
                entries.push({
                    request_id: evt.request_id,
                    url: evt.url,
                    method: evt.method,
                    status: '...',
                    type: evt.resource_type,
                    size: null,
                    time_ms: null,
                    t_start: evt.timestamp,
                });
                renderRows();
            });
            window.cdp.on('Network.responseReceived', evt => {
                const e = findById(evt.request_id);
                if (e) { e.status = evt.status; renderRows(); }
            });
            window.cdp.on('Network.loadingFinished', evt => {
                const e = findById(evt.request_id);
                if (e) {
                    e.size = evt.encoded_data_length;
                    e.time_ms = Math.round((evt.timestamp - e.t_start) * 1000);
                    renderRows();
                }
            });
        }
    })();
</script>
