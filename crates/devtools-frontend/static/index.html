<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevTools</title>
    <style id="theme-css"></style>
    <script id="cdp-js"></script>
</head>
<body>
    <div class="tab-strip" id="tab-strip">
        <div class="tab active" id="tab-elements">Elements</div>
        <div class="tab" id="tab-console">Console</div>
        <div class="tab" id="tab-sources">Sources</div>
        <div class="tab" id="tab-network">Network</div>
        <div class="tab" id="tab-performance">Performance</div>
    </div>
    <div class="panel-body">
        <div id="panel-elements" class="panel"></div>
        <div id="panel-console" class="panel" style="display:none"></div>
        <div id="panel-sources" class="panel" style="display:none"></div>
        <div id="panel-network" class="panel" style="display:none"></div>
        <div id="panel-performance" class="panel" style="display:none"></div>
    </div>
    <!-- Per-panel HTML bude injectnut shell-side do prislusneho #panel-* divu
         (innerHTML pri build_devtools_html). Tab click jen flippe display
         mezi panel divs - zadny innerHTML swap, zadne re-eval scripts. -->
    <script>
        (function () {
            var panels = ['elements','console','sources','network','performance'];
            for (var i = 0; i < panels.length; i++) {
                (function (name) {
                    var tab = document.getElementById('tab-' + name);
                    if (!tab) return;
                    tab.addEventListener('click', function () {
                        for (var j = 0; j < panels.length; j++) {
                            var p = document.getElementById('panel-' + panels[j]);
                            var t = document.getElementById('tab-' + panels[j]);
                            if (p) p.style.display = (panels[j] === name) ? '' : 'none';
                            if (t) {
                                if (panels[j] === name) t.className = 'tab active';
                                else t.className = 'tab';
                            }
                        }
                    });
                })(panels[i]);
            }
        })();
    </script>
</body>
</html>
