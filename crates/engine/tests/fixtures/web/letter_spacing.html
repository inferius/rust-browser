<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>letter_spacing</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; padding: 20px; font-size: 16px; }
.tight { letter-spacing: -1px; }
.normal { letter-spacing: normal; }
.wide { letter-spacing: 4px; }
.em-wide { letter-spacing: 0.2em; }
.box { padding: 8px; margin-bottom: 6px; background: #eef; display: inline-block; }
</style>
</head><body>
<div id="a" class="box tight">TIGHT TEXT</div>
<div id="b" class="box normal">NORMAL TEXT</div>
<div id="c" class="box wide">WIDE TEXT</div>
<div id="d" class="box em-wide">EM WIDE</div>
</body></html>
