<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>grid_negative</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; font-size: 16px; }
.grid {
  display: grid;
  grid-template-columns: 80px 80px 80px 80px;
  grid-template-rows: 50px 50px;
  gap: 5px;
  width: 335px;
}
.cell { background: #dcc; }
#last { grid-column: -2 / -1; background: #88f; }
#full { grid-column: 1 / -1; grid-row: 2; background: #f88; }
</style>
</head><body>
<div class="grid">
  <div id="a" class="cell">A</div>
  <div id="b" class="cell">B</div>
  <div id="c" class="cell">C</div>
  <div id="last" class="cell">last</div>
  <div id="full" class="cell">full</div>
</div>
</body></html>
