<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>font_inherit</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; font-size: 16px; line-height: 1.5; color: #333; }
.outer { padding: 10px; width: 400px; font-size: 14px; }
.mid { padding: 8px; font-weight: 700; }
.inner { padding: 6px; font-style: italic; }
.override { font-size: 22px; }
</style>
</head><body>
<div class="outer">
  <div class="mid">
    <div id="a" class="inner">14px bold italic from chain</div>
  </div>
</div>
<div class="outer">
  <div class="mid">
    <div id="b" class="inner override">22px bold italic override</div>
  </div>
</div>
</body></html>
