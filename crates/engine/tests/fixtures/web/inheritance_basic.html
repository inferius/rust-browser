<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>inheritance_basic</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; font-size: 20px; color: #c00; line-height: 1.5; }
.wrap { width: 400px; padding: 10px; background: #eee; }
.box { padding: 8px; background: #fff; margin-bottom: 8px; }
.bold { font-weight: 700; }
.small { font-size: 12px; }
</style>
</head><body>
<div class="wrap">
  <div id="b1" class="box">Inherits body 20px red</div>
  <div id="b2" class="box bold">Bold inherits 20px red</div>
  <div id="b3" class="box small">Small 12px inherits red</div>
</div>
</body></html>
