<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>grid_2col_fr</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; }
.container {
  display: grid;
  grid-template-columns: 310px 1fr;
  width: 100%;
}
.sidebar {
  background: #eef;
  padding: 10px;
  height: 200px;
}
.content {
  background: #fee;
  padding: 10px;
  height: 200px;
}
</style>
</head><body>
<div class="container">
  <div id="a" class="sidebar">sidebar 310px</div>
  <div id="b" class="content">content 1fr (rest)</div>
</div>
</body></html>
