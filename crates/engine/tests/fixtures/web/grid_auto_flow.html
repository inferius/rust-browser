<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>grid_auto_flow</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; font-size: 16px; }
.grid {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  grid-auto-rows: 60px;
  gap: 8px;
  width: 320px;
}
.cell { background: #ccc; }
#a { grid-column: 2; grid-row: 1; }
</style>
</head><body>
<div class="grid">
  <div id="a" class="cell">A</div>
  <div id="b" class="cell">B</div>
  <div id="c" class="cell">C</div>
  <div id="d" class="cell">D</div>
  <div id="e" class="cell">E</div>
</div>
</body></html>
