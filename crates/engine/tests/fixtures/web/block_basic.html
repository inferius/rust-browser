<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>block_basic</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; font-size: 16px; }
.wrap { width: 400px; padding: 20px; background: #eee; }
.box { width: 200px; height: 80px; margin: 10px 0; background: #ccc; }
.inner { padding: 8px 16px; border: 2px solid #888; background: #fff; }
</style>
</head><body>
<div class="wrap">
  <div id="b1" class="box"></div>
  <div id="b2" class="box inner"></div>
  <div id="b3" class="box"></div>
</div>
</body></html>
